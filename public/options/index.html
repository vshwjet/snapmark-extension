<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Snapmark Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      padding: 32px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #141414;
      color: #fff;
      max-width: 520px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: #0088FF;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 { font-size: 20px; font-weight: 700; }
    .section {
      background: #1a1a1a;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      padding: 20px;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 6px;
    }
    .section-desc {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .section-desc a {
      color: #0088FF;
      text-decoration: none;
    }
    .section-desc a:hover { text-decoration: underline; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #0088FF; }
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .input-row input { flex: 1; }
    .show-btn {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
    }
    .show-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .save-btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      background: #0088FF;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
    }
    .save-btn:hover { background: #1a96ff; }
    .clear-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .clear-btn:hover { background: rgba(255,0,0,0.1); color: #FF383C; border-color: rgba(255,56,60,0.3); }
    .status {
      font-size: 12px;
      color: #34C759;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .status.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="14" height="10" rx="2.5" stroke="white" stroke-width="1.5"/>
        <path d="M6 16l2.5-3.5h1L12 16" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="5" y1="5.5" x2="13" y2="5.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="5" y1="8.5" x2="10" y2="8.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Snapmark Settings</h1>
  </div>

  <div class="section">
    <div class="section-title">imgBB API Key</div>
    <div class="section-desc">
      Optional. When set, screenshots are uploaded to <a href="https://imgbb.com" target="_blank">imgBB</a>
      so the Markdown export contains real hosted image URLs instead of large base64 blobs.
      Get a free key at <a href="https://api.imgbb.com/" target="_blank">api.imgbb.com</a>.
    </div>
    <label for="api-key">API Key</label>
    <div class="input-row">
      <input type="password" id="api-key" placeholder="Paste your imgBB API key…" />
      <button class="show-btn" id="show-btn">Show</button>
    </div>
    <div class="actions">
      <button class="save-btn" id="save-btn">Save</button>
      <button class="clear-btn" id="clear-btn">Clear</button>
      <span class="status" id="status-msg">Saved!</span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
